<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>オコジョ先生のレールパズル</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="app-container">

        <!-- ============================
             トップ画面
        ============================= -->
        <div id="screen-top" class="screen active">
            <!-- 歯車ボタン -->
            <button id="btn-settings" class="settings-gear" title="せってい">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="3" />
                    <path
                        d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 01-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z" />
                </svg>
            </button>

            <div class="top-header">
                <div class="top-okojo">
                    <img src="okojo.jpg" alt="オコジョ先生">
                </div>
                <h1>
                    オコジョ<ruby>先生<rt>せんせい</rt></ruby>の<br>レールパズル
                </h1>
                <p class="top-sub">ステップを えらんでね！</p>
                <div class="top-actions" style="margin-top:15px;">
                    <button id="btn-show-achievements" class="btn-achievements">🏅 メダルを みる</button>
                </div>
            </div>

            <div class="course-cards">
                <button class="course-card" data-course="A">
                    <div class="card-icon">
                        <svg width="40" height="40" viewBox="0 0 40 40" fill="none" stroke="#4CAF50" stroke-width="3.5"
                            stroke-linecap="round" stroke-linejoin="round">
                            <line x1="20" y1="5" x2="20" y2="35" />
                        </svg>
                    </div>
                    <div class="card-label">コースA<br><span>まっすぐ コース</span></div>
                </button>
                <button class="course-card" data-course="B">
                    <div class="card-icon">
                        <svg width="40" height="40" viewBox="0 0 40 40" fill="none" stroke="#4CAF50" stroke-width="3.5"
                            stroke-linecap="round" stroke-linejoin="round">
                            <path d="M 10,30 C 10,10 30,10 30,30" />
                        </svg>
                    </div>
                    <div class="card-label">コースB<br><span>くねくね コース</span></div>
                </button>
                <button class="course-card locked" data-course="C" id="btn-course-c">
                    <div class="card-icon">
                        <span style="font-size: 32px">🔒</span>
                    </div>
                    <div class="card-label">コースC<br><span>ミックス コース</span></div>
                </button>
            </div>
        </div>

        <!-- ============================
             ステージ選択画面
        ============================= -->
        <div id="screen-stage-select" class="screen">
            <header>
                <button id="btn-stage-back"
                    style="background: rgba(255,255,255,0.2); border: none; color: white; padding: 8px 14px; border-radius: 50px; font-weight: bold; cursor: pointer;">⬅
                    もどる</button>
                <div id="stage-select-title" style="font-weight: bold; font-size: 1.2rem;">コースをえらんでね</div>
                <div style="width: 80px;"></div> <!-- レイアウト調整用 -->
            </header>
            <div class="stage-scroll-wrapper">
                <div id="stage-list" class="stage-list">
                    <!-- JSで動的にステージアイコン(1, 2, 3...)を追加する -->
                </div>
            </div>
        </div>

        <!-- ============================
             設定モーダル
        ============================= -->
        <div id="settings-modal" class="settings-overlay hidden">
            <div class="settings-card">
                <h2>⚙️ せってい</h2>

                <div class="settings-section">
                    <label class="settings-section-label">📏 レールの ながさ（スケール）</label>
                    <div class="round-buttons" id="length-buttons">
                        <button class="length-btn active" data-length="2">ふつう (2)</button>
                        <button class="length-btn" data-length="1">みじかい (1)</button>
                        <button class="length-btn" data-length="3">ながい (3)</button>
                    </div>
                </div>

                <div class="settings-section">
                    <label class="settings-section-label">🏠 えき の いろ</label>
                    <div class="color-palette" id="palette-station">
                        <button class="color-swatch active" data-color="#2196F3" style="background:#2196F3"
                            title="あお"></button>
                        <button class="color-swatch" data-color="#4CAF50" style="background:#4CAF50"
                            title="みどり"></button>
                        <button class="color-swatch" data-color="#FF9800" style="background:#FF9800"
                            title="オレンジ"></button>
                        <button class="color-swatch" data-color="#E91E63" style="background:#E91E63"
                            title="ピンク"></button>
                        <button class="color-swatch" data-color="#9C27B0" style="background:#9C27B0"
                            title="むらさき"></button>
                        <button class="color-swatch" data-color="#00BCD4" style="background:#00BCD4"
                            title="みずいろ"></button>
                    </div>
                </div>

                <div class="settings-section">
                    <label class="settings-section-label">🔒 クリアまえの ステージを ロックする</label>
                    <div class="round-buttons" id="lock-buttons">
                        <button class="length-btn" data-lock="true">する</button>
                        <button class="length-btn active" data-lock="false">しない</button>
                    </div>
                </div>

                <div class="settings-section"
                    style="border-top: 1px dashed #ccc; margin-top: 15px; padding-top: 20px; text-align: center;">
                    <button id="btn-reset-data"
                        style="background:#F44336; color:white; border:none; padding:10px 20px; border-radius:50px; font-weight:bold; font-size:1rem; cursor:pointer;">⚠️
                        じっせき・すすみを リセット</button>
                </div>

                <button id="btn-settings-close" class="settings-close-btn">とじる</button>
            </div>
        </div>

        <!-- ============================
             ゲーム画面
        ============================= -->
        <div id="screen-game" class="screen">
            <header>
                <button id="btn-home" title="トップへ戻る">🏠 もどる</button>
                <div id="step-indicator">ステップ 1</div>
                <div id="round-indicator" style="width:80px;text-align:right;font-size:0.85rem;color:#fff;opacity:0.85">
                </div>
            </header>

            <main id="play-area">
                <svg id="game-svg" width="100%" height="100%" viewBox="0 0 800 600" preserveAspectRatio="xMidYMid meet">
                    <g id="layer-rails"></g>
                    <g id="layer-active"></g>
                    <g id="layer-train"></g>
                </svg>
            </main>

            <footer>
                <div id="okojo-guide">
                    <div class="okojo-avatar">
                        <img src="okojo.jpg" alt="オコジョ先生">
                    </div>
                    <div class="speech-bubble" id="instruction-text">
                        よろしくね！
                    </div>
                </div>
            </footer>

            <!-- クリア後オーバーレイ（ステップ1専用） -->
            <div id="clear-overlay" class="clear-overlay hidden">
                <div class="clear-card">
                    <div class="clear-emoji">🎉</div>
                    <div id="clear-message" class="clear-message">クリア！</div>
                    <div id="clear-progress" class="clear-progress"></div>
                    <div class="clear-buttons">
                        <button id="btn-continue" class="clear-btn continue-btn">つづける ▶</button>
                        <button id="btn-back-top" class="clear-btn back-btn">トップへ</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- ============================
             実績確認（メダルコレクション）画面
        ============================= -->
    <div id="screen-achievements" class="screen">
        <header>
            <button id="btn-achievements-back" title="トップへ戻る">🏠 もどる</button>
            <div style="flex-grow:1; text-align:center; font-weight:bold; font-size:1.2rem;">メダル コレクション</div>
            <div style="width:80px;"></div> <!-- バランス用のダミー -->
        </header>
        <main class="achievements-content">
            <div class="achievements-header-msg">
                あつめた メダル が ここにならぶよ！<br>
                ぜんぶ あつめて レールマスター に なろう！
            </div>

            <div id="achievements-grid" class="achievements-grid">
                <!-- JSで動的にメダル要素を追加 -->
            </div>
        </main>
    </div>

    </div>
    <script src="script.js"></script>
</body>

</html>
